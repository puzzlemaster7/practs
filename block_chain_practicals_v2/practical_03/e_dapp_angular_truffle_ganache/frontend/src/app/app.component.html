<main class="page">
  <section class="card hero">
    <p class="eyebrow">Practical 3(e)</p>
    <h1>Angular + Truffle + Ganache DApp</h1>
    <p class="subtitle">{{ status }}</p>
  </section>

  <section class="card">
    <h2>Backend link</h2>
    <div class="meta">RPC: {{ rpcUrl }}</div>
    <div class="meta">Contract: {{ contractAddress }}</div>
    <button type="button" (click)="loadValue()" [disabled]="loading">Load stored value</button>
  </section>

  <section class="card">
    <h2>Current value</h2>
    <div class="output">{{ storedValue || 'Nothing saved yet' }}</div>
  </section>

  <section class="card">
    <h2>Write to contract</h2>
    <label for="valueInput">Value</label>
    <input id="valueInput" [value]="newValue" (input)="newValue = $any($event.target).value" placeholder="Enter a value">
    <button type="button" (click)="saveValue()" [disabled]="loading">Send transaction</button>
  </section>
</main>
